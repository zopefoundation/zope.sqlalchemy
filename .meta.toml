# Generated from:
# https://github.com/zopefoundation/meta/tree/master/config/zope-product
[meta]
template = "zope-product"
commit-id = "cba598ba16bcbc037c23fcee642fe2869a818dea"

[python]
with-appveyor = false
with-pypy = false
with-legacy-python = true
with-docs = false
with-sphinx-doctests = false

[coverage]
fail-under = 70

[tox]
testenv-commands-pre = [
    "{envbindir}/buildout -nc {toxinidir}/postgres.cfg buildout:directory={envdir} buildout:develop={toxinidir}",
    ]
testenv-commands = [
    "{envbindir}/test {posargs:-cv}",
    "sh -c 'if [ '{env:CI:}' = 'true' ]; then {envbindir}/testpg {posargs:-cv} ; fi'",
    "sh -c 'if [ '{env:CI:}' = 'true' ]; then {envbindir}/testpg2 {posargs:-cv} ; fi'",
    ]
testenv-additional = [
    "passenv =",
    "    CI",
    ]

[manifest]
additional-rules = [
    "include mysql.cfg",
    "include oracle.cfg",
    "include postgres.cfg",
    "include pysqlite.cfg",
    ]
