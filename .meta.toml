# Generated from:
# https://github.com/zopefoundation/meta/tree/master/config/zope-product
[meta]
template = "zope-product"
commit-id = "8311ae3788ee0ebffe83a977ac65e4c9eac66c77"

[python]
with-appveyor = false
with-pypy = false
with-legacy-python = true
with-docs = false
with-sphinx-doctests = false

[coverage]
fail-under = 70

[tox]
testenv-commands-pre = [
    "sh -c 'if [ '{env:CI:false}' = 'true' ]; then {envbindir}/buildout -nc {toxinidir}/github_actions.cfg buildout:directory={envdir} buildout:develop={toxinidir} ; fi'",
    "sh -c 'if [ '{env:CI:false}' != 'true' ]; then {envbindir}/buildout -nc {toxinidir}/postgres.cfg buildout:directory={envdir} buildout:develop={toxinidir} ; fi'",
    ]
testenv-commands = [
    "{envbindir}/test {posargs:-cv}",
    "sh -c 'if [ '{env:CI:false}' = 'true' ]; then {envbindir}/testpg {posargs:-cv} ; fi'",
    "sh -c 'if [ '{env:CI:false}' = 'true' ]; then {envbindir}/testpg2 {posargs:-cv} ; fi'",
    ]
testenv-additional = [
    "passenv =",
    "    CI",
    ]

[manifest]
additional-rules = [
    "include github_actions.cfg",
    "include mysql.cfg",
    "include oracle.cfg",
    "include postgres.cfg",
    "include pysqlite.cfg",
    ]

[github-actions]
services = [
    "postgres:",
    "  image: postgres:13",
    "  env:",
    "    POSTGRES_USER: postgres",
    "    POSTGRES_PASSWORD: postgres",
    "    POSTGRES_DB: zope_sqlalchemy_tests",
    "  # Set health checks to wait until postgres has started",
    "  options: >-",
    "    --mount type=tmpfs,destination=/var/lib/postgresql/data",
    "    --health-cmd pg_isready",
    "    --health-interval 10s",
    "    --health-timeout 5s",
    "    --health-retries 5",
    "  ports:",
    "    - 5432:5432",
    ]
steps-before-checkout = [
    "- name: \"Configure PostgreSQL\"",
    "  run: |",
    "    docker exec ${{ job.services.postgres.id }} sh -c 'cat /var/lib/postgresql/data/postgresql.conf'",
    "    docker exec ${{ job.services.postgres.id }} sh -c 'cat /var/lib/postgresql/data/postgresql.conf.sample'",
    "    docker exec ${{ job.services.postgres.id }} sh -c 'echo \"max_prepared_transactions=10\" >> /var/lib/postgresql/data/postgresql.conf'",
    "    docker exec ${{ job.services.postgres.id }} sh -c 'cat /var/lib/postgresql/data/postgresql.conf'",
    "    docker kill --signal=SIGHUP ${{ job.services.postgres.id }}",
    ]
