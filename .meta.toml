# Generated from:
# https://github.com/zopefoundation/meta/tree/master/config/zope-product
[meta]
template = "zope-product"
commit-id = "a8bafcbd51db1c9028304d8c17e7f34ac563e9ad"

[python]
with-appveyor = false
with-pypy = false
with-legacy-python = true
with-docs = false
with-sphinx-doctests = false

[coverage]
fail-under = 70

[tox]
testenv-commands-pre = [
    "sh -c 'if [ '{env:CI:}' = 'true' ]; then {envbindir}/buildout -nc {toxinidir}/github_actions.cfg buildout:directory={envdir} buildout:develop={toxinidir} ; fi'",
    "sh -c 'if [ '{env:CI:}' != 'true' ]; then {envbindir}/buildout -nc {toxinidir}/postgres.cfg buildout:directory={envdir} buildout:develop={toxinidir} ; fi'",
    ]
testenv-commands = [
    "{envbindir}/test {posargs:-cv}",
    "sh -c 'if [ '{env:CI:}' = 'true' ]; then {envbindir}/testpg {posargs:-cv} ; fi'",
    "sh -c 'if [ '{env:CI:}' = 'true' ]; then {envbindir}/testpg2 {posargs:-cv} ; fi'",
    ]
testenv-additional = [
    "passenv =",
    "    CI",
    ]

[manifest]
additional-rules = [
    "include mysql.cfg",
    "include oracle.cfg",
    "include postgres.cfg",
    "include pysqlite.cfg",
    ]

[github-actions]
additional-install = [
    "echo ::set-output name=GH_USER::$(whoami)",
    ]
services = [
    "postgres:",
    "  image: postgres",
    "  env:",
    "    POSTGRES_USER: root",
    "    POSTGRES_DB: zope_sqlalchemy_tests",
    "    POSTGRES_HOST_AUTH_METHOD: ident",
    "  # Set health checks to wait until postgres has started",
    "  options: >-",
    "    --health-cmd pg_isready",
    "    --health-interval 10s",
    "    --health-timeout 5s",
    "    --health-retries 5",
    "  ports:",
    "    - 5432:5432",
    ]
